    <!-- Create/Edit Template Modal -->
    <div id="templateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Create Label Template</h3>
                <button onclick="closeModal()" class="btn btn-secondary btn-sm">✕</button>
            </div>
            <div class="modal-body">
                <form id="templateForm">
                    <div class="form-group">
                        <label class="form-label" for="templateName">Template Name</label>
                        <input type="text" id="templateName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="templateDescription">Description</label>
                        <input type="text" id="templateDescription" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="templateContent">Template Content</label>
                        <textarea id="templateContent" class="form-input form-textarea" required 
                                  placeholder="Use {{variableName}} for placeholders. Example: Tracking ID: {{trackingId}}"></textarea>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="labelWidth">Width (mm)</label>
                            <input type="number" id="labelWidth" class="form-input" value="100" min="10" max="500">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="labelHeight">Height (mm)</label>
                            <input type="number" id="labelHeight" class="form-input" value="50" min="10" max="500">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Variables</label>
                        <div id="variablesList">
                            <!-- Variables will be added here -->
                        </div>
                        <button type="button" class="btn btn-secondary" onclick="addVariable()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Variable
                        </button>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveTemplate()">Save Template</button>
            </div>
        </div>
    </div>

    <script>
        let currentTemplates = [];
        let currentEditingTemplate = null;
        let variableCounter = 0;

        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.querySelector('#themeToggle svg');
            if (theme === 'dark') {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            } else {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            }
        }

        // Tab Management
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
            
            if (tabName === 'generator') {
                loadTemplatesForGenerator();
            } else if (tabName === 'generated') {
                loadGeneratedLabels();
            }
        }

        // Toast Notifications
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span class="toast-content">${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Template Management
        async function loadTemplates() {
            try {
                const response = await fetch('/api/label-templates', {
                    credentials: 'include'
                });
                if (!response.ok) throw new Error('Failed to load templates');
                
                currentTemplates = await response.json();
                renderTemplates();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function renderTemplates() {
            const container = document.getElementById('templatesList');
            
            if (currentTemplates.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="9" x2="15" y2="9"></line>
                            <line x1="9" y1="13" x2="15" y2="13"></line>
                        </svg>
                        <h3>No templates yet</h3>
                        <p>Create your first label template to get started</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = currentTemplates.map(template => `
                <div class="template-item">
                    <div class="template-header">
                        <div>
                            <div class="template-name">${template.name}</div>
                            <div class="template-description">${template.description || 'No description'}</div>
                        </div>
                        <div class="template-actions">
                            <button class="btn btn-secondary btn-sm" onclick="previewTemplate('${template._id}')">Preview</button>
                            <button class="btn btn-secondary btn-sm" onclick="editTemplate('${template._id}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteTemplate('${template._id}')">Delete</button>
                        </div>
                    </div>
                    <div class="template-meta">
                        <span>${template.dimensions.width}×${template.dimensions.height}mm</span>
                        <span>${template.variables.length} variables</span>
                        <span>Created ${new Date(template.createdAt).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadTemplatesForGenerator() {
            const select = document.getElementById('templateSelect');
            select.innerHTML = '<option value="">Choose a template...</option>';
            
            currentTemplates.forEach(template => {
                if (template.isActive) {
                    select.innerHTML += `<option value="${template._id}">${template.name}</option>`;
                }
            });
        }

        // Modal Management
        function openCreateModal() {
            currentEditingTemplate = null;
            document.getElementById('modalTitle').textContent = 'Create Label Template';
            document.getElementById('templateForm').reset();
            document.getElementById('variablesList').innerHTML = '';
            variableCounter = 0;
            addVariable(); // Add one default variable
            document.getElementById('templateModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('templateModal').classList.remove('active');
        }

        function addVariable() {
            const container = document.getElementById('variablesList');
            const id = `var_${variableCounter++}`;
            
            const variableDiv = document.createElement('div');
            variableDiv.className = 'variable-item';
            variableDiv.id = id;
            variableDiv.innerHTML = `
                <input type="text" placeholder="Variable name" class="form-input" style="flex: 1;" data-field="name">
                <select class="form-input" style="flex: 1;" data-field="type">
                    <option value="text">Text</option>
                    <option value="number">Number</option>
                    <option value="date">Date</option>
                    <option value="email">Email</option>
                    <option value="phone">Phone</option>
                    <option value="url">URL</option>
                    <option value="barcode">Barcode</option>
                    <option value="qrcode">QR Code</option>
                </select>
                <label style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" data-field="required">
                    <span>Required</span>
                </label>
                <input type="text" placeholder="Default value" class="form-input" style="flex: 1;" data-field="defaultValue">
                <button type="button" class="variable-remove" onclick="removeVariable('${id}')">✕</button>
            `;
            
            container.appendChild(variableDiv);
        }

        function removeVariable(id) {
            document.getElementById(id).remove();
        }

        async function saveTemplate() {
            const name = document.getElementById('templateName').value.trim();
            const description = document.getElementById('templateDescription').value.trim();
            const template = document.getElementById('templateContent').value.trim();
            const width = parseInt(document.getElementById('labelWidth').value);
            const height = parseInt(document.getElementById('labelHeight').value);
            
            if (!name || !template) {
                showToast('Name and template content are required', 'error');
                return;
            }
            
            const variables = [];
            document.querySelectorAll('#variablesList .variable-item').forEach(item => {
                const name = item.querySelector('[data-field="name"]').value.trim();
                if (name) {
                    variables.push({
                        name,
                        type: item.querySelector('[data-field="type"]').value,
                        required: item.querySelector('[data-field="required"]').checked,
                        defaultValue: item.querySelector('[data-field="defaultValue"]').value.trim()
                    });
                }
            });
            
            const templateData = {
                name,
                description,
                template,
                variables,
                dimensions: { width, height, unit: 'mm' },
                style: {
                    fontSize: 12,
                    fontFamily: 'Arial',
                    alignment: 'center',
                    backgroundColor: '#ffffff',
                    textColor: '#000000',
                    borderWidth: 1,
                    borderColor: '#000000'
                }
            };
            
            try {
                const url = currentEditingTemplate 
                    ? `/api/label-templates/${currentEditingTemplate}`
                    : '/api/label-templates';
                const method = currentEditingTemplate ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(templateData)
                });
                
                if (!response.ok) throw new Error('Failed to save template');
                
                showToast('Template saved successfully', 'success');
                closeModal();
                loadTemplates();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function editTemplate(id) {
            const template = currentTemplates.find(t => t._id === id);
            if (!template) return;
            
            currentEditingTemplate = id;
            document.getElementById('modalTitle').textContent = 'Edit Label Template';
            
            document.getElementById('templateName').value = template.name;
            document.getElementById('templateDescription').value = template.description || '';
            document.getElementById('templateContent').value = template.template;
            document.getElementById('labelWidth').value = template.dimensions.width;
            document.getElementById('labelHeight').value = template.dimensions.height;
            
            document.getElementById('variablesList').innerHTML = '';
            variableCounter = 0;
            
            template.variables.forEach(variable => {
                addVariable();
                const lastVar = document.querySelector(`#variablesList .variable-item:last-child`);
                lastVar.querySelector('[data-field="name"]').value = variable.name;
                lastVar.querySelector('[data-field="type"]').value = variable.type;
                lastVar.querySelector('[data-field="required"]').checked = variable.required;
                lastVar.querySelector('[data-field="defaultValue"]').value = variable.defaultValue || '';
            });
            
            document.getElementById('templateModal').classList.add('active');
        }

        async function deleteTemplate(id) {
            if (!confirm('Are you sure you want to delete this template?')) return;
            
            try {
                const response = await fetch(`/api/label-templates/${id}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('Failed to delete template');
                
                showToast('Template deleted successfully', 'success');
                loadTemplates();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function previewTemplate(id) {
            try {
                const response = await fetch(`/api/label-templates/${id}/preview`);
                if (!response.ok) throw new Error('Failed to generate preview');
                
                const preview = await response.json();
                
                // Create or update printable view modal for template preview
                let modal = document.getElementById('printModal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = 'printModal';
                    modal.className = 'print-modal';
                    modal.innerHTML = `
                        <div class="print-modal-content">
                            <div class="print-modal-header">
                                <h3>Template Preview</h3>
                                <div class="print-modal-actions">
                                    <button class="btn btn-primary" onclick="window.print()">
                                        <span>🖨️</span> Print
                                    </button>
                                    <button class="btn btn-secondary" onclick="closePrintModal()">
                                        <span>✕</span> Close
                                    </button>
                                </div>
                            </div>
                            <div class="print-modal-body">
                                <div id="printableLabel"></div>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(modal);
                }
                
                // Update header for template preview
                const header = modal.querySelector('.print-modal-header h3');
                header.textContent = 'Template Preview';
                
                // Calculate actual size (1mm = 3.78px at 96 DPI)
                const mmToPx = 3.78;
                const actualWidthPx = preview.dimensions.width * mmToPx;
                const actualHeightPx = preview.dimensions.height * mmToPx;
                
                // Set the printable content at actual size
                const printableContent = document.getElementById('printableLabel');
                
                if (!printableContent) {
                    console.error('Printable label container not found');
                    return;
                }
                printableContent.innerHTML = `
                    <div class="printable-label-container" style="
                        width: ${actualWidthPx}px;
                        height: ${actualHeightPx}px;
                        font-size: ${preview.style.fontSize}px;
                        font-family: ${preview.style.fontFamily};
                        text-align: ${preview.style.alignment};
                        background-color: ${preview.style.backgroundColor};
                        color: ${preview.style.textColor};
                        border: ${preview.style.borderWidth}px solid ${preview.style.borderColor};
                        display: flex;
                        align-items: flex-start;
                        justify-content: flex-start;
                        padding: 8px;
                        box-sizing: border-box;
                        overflow: hidden;
                        page-break-inside: avoid;
                    ">
                        ${preview.template}
                    </div>
                    <div class="print-info" style="
                        margin-top: 20px;
                        padding: 10px;
                        background: #f5f5f5;
                        border-radius: 4px;
                        font-size: 12px;
                        color: #666;
                        text-align: center;
                    ">
                        <strong>Template Preview</strong><br>
                        <strong>Dimensions:</strong> ${preview.dimensions.width}×${preview.dimensions.height}${preview.dimensions.unit}<br>
                        <strong>Font Size:</strong> ${preview.style.fontSize}px<br>
                        <strong>Font Family:</strong> ${preview.style.fontFamily}<br>
                        <strong>Alignment:</strong> ${preview.style.alignment}<br>
                        <em>This is a preview with sample data</em>
                    </div>
                `;
                
                // Show the modal
                modal.classList.add('active');
                
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Label Generation
        document.getElementById('templateSelect').addEventListener('change', function() {
            const templateId = this.value;
            if (!templateId) {
                document.getElementById('variableFields').innerHTML = '';
                document.getElementById('variableFieldsSection').style.display = 'none';
                // Clear validation summary
                const summaryDiv = document.getElementById('validationSummary');
                if (summaryDiv) summaryDiv.remove();
                return;
            }
            
            const template = currentTemplates.find(t => t._id === templateId);
            if (!template) return;
            
            // Show the variable fields section
            document.getElementById('variableFieldsSection').style.display = 'block';
            
            const container = document.getElementById('variableFields');
            container.innerHTML = '';
            
            template.variables.forEach(variable => {
                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'form-group';
                
                const inputType = variable.type === 'number' ? 'number' : 
                                 variable.type === 'date' ? 'date' : 'text';
                
                const requiredAttr = variable.required ? 'required' : '';
                const requiredLabel = variable.required ? ' *' : '';
                
                // Set default value based on variable type
                let defaultValue = variable.defaultValue || '';
                if (variable.type === 'date' && !defaultValue) {
                    // Set default to today's date in YYYY-MM-DD format
                    const today = new Date();
                    defaultValue = today.toISOString().split('T')[0];
                } else if (variable.type === 'number' && !defaultValue) {
                    // Set default to 1 for number fields (especially quantity)
                    defaultValue = '1';
                }
                
                fieldDiv.innerHTML = `
                    <label class="form-label" for="var_${variable.name}">
                        ${variable.name}${requiredLabel}
                        <span class="variable-type" style="font-size: 0.75em; color: #666; margin-left: 5px;">(${variable.type})</span>
                    </label>
                    <input type="${inputType}" 
                           id="var_${variable.name}" 
                           class="form-input" 
                           placeholder="${defaultValue || `Enter ${variable.name}`}"
                           value="${defaultValue}"
                           ${requiredAttr}
                           data-variable-type="${variable.type}"
                           data-required="${variable.required}"
                           onblur="validateVariable(this)"
                           oninput="validateVariable(this)">
                    <div class="validation-error" id="error_${variable.name}" style="color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem; display: none;"></div>
                `;
                
                container.appendChild(fieldDiv);
            });
            
            // Update validation summary after template loads
            setTimeout(updateValidationSummary, 100);
        });

        // Client-side validation function
        function validateVariable(input) {
            const variableName = input.id.replace('var_', '');
            const value = input.value.trim();
            const type = input.dataset.variableType;
            const required = input.dataset.required === 'true';
            const errorDiv = document.getElementById(`error_${variableName}`);
            
            // Clear previous error
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            input.classList.remove('invalid');
            
            // Check required fields
            if (required && !value) {
                showValidationError(variableName, `${variableName} is required`);
                updateValidationSummary();
                return false;
            }
            
            // Skip validation if field is empty and not required
            if (!value && !required) {
                updateValidationSummary();
                return true;
            }
            
            // Type-specific validation
            let isValid = true;
            let errorMessage = '';
            
            switch (type) {
                case 'number':
                    if (isNaN(Number(value))) {
                        errorMessage = `${variableName} must be a valid number`;
                        isValid = false;
                    }
                    break;
                case 'date':
                    const dateValue = new Date(value);
                    if (isNaN(dateValue.getTime())) {
                        errorMessage = `${variableName} must be a valid date`;
                        isValid = false;
                    }
                    break;
                case 'email':
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(value)) {
                        errorMessage = `${variableName} must be a valid email address`;
                        isValid = false;
                    }
                    break;
                case 'phone':
                    const phoneRegex = /^[\d\s\-\+\(\)]+$/;
                    if (!phoneRegex.test(value)) {
                        errorMessage = `${variableName} must be a valid phone number`;
                        isValid = false;
                    }
                    break;
                case 'url':
                    try {
                        if (!value.startsWith('http')) {
                            new URL('https://' + value);
                        } else {
                            new URL(value);
                        }
                    } catch {
                        errorMessage = `${variableName} must be a valid URL`;
                        isValid = false;
                    }
                    break;
            }
            
            if (!isValid) {
                showValidationError(variableName, errorMessage);
            }
            
            // Update validation summary after each change
            updateValidationSummary();
            
            return isValid;
        }

        function showValidationError(variableName, message) {
            const errorDiv = document.getElementById(`error_${variableName}`);
            const input = document.getElementById(`var_${variableName}`);
            
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            input.classList.add('invalid');
        }

        function updateValidationSummary() {
            const templateSelect = document.getElementById('templateSelect');
            const templateId = templateSelect.value;
            
            if (!templateId) {
                // Remove validation summary if no template selected
                const summaryDiv = document.getElementById('validationSummary');
                if (summaryDiv) summaryDiv.remove();
                return;
            }
            
            const template = currentTemplates.find(t => t._id === templateId);
            if (!template) return;
            
            let validCount = 0;
            let totalCount = 0;
            const errors = [];
            
            template.variables.forEach(variable => {
                const input = document.getElementById(`var_${variable.name}`);
                if (input) {
                    totalCount++;
                    const isValid = !input.classList.contains('invalid') && 
                                   (!variable.required || input.value.trim() !== '');
                    if (isValid) {
                        validCount++;
                    } else {
                        const errorDiv = document.getElementById(`error_${variable.name}`);
                        if (errorDiv && errorDiv.style.display !== 'none') {
                            errors.push(`${variable.name}: ${errorDiv.textContent}`);
                        }
                    }
                }
            });
            
            // Update or create validation summary
            let summaryDiv = document.getElementById('validationSummary');
            if (!summaryDiv) {
                summaryDiv = document.createElement('div');
                summaryDiv.id = 'validationSummary';
                summaryDiv.className = 'validation-summary';
                
                // Insert after the form
                const form = document.querySelector('#generator-tab form');
                if (form && form.parentNode) {
                    form.parentNode.insertBefore(summaryDiv, form.nextSibling);
                } else {
                    // Fallback: add to generator tab
                    const generatorTab = document.getElementById('generator-tab');
                    if (generatorTab) {
                        generatorTab.appendChild(summaryDiv);
                    } else {
                        console.error('Cannot find container for validation summary');
                        return;
                    }
                }
            }
            
            // Only set innerHTML if element exists in DOM
            if (summaryDiv && summaryDiv.parentNode) {
                if (errors.length > 0) {
                    summaryDiv.innerHTML = `
                        <div style="background: #fef2f2; border: 1px solid #fecaca; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem;">
                            <div style="color: #dc2626; font-weight: bold; margin-bottom: 0.5rem;">
                                ⚠️ Validation Issues (${errors.length})
                            </div>
                            <ul style="margin: 0; padding-left: 1.25rem; color: #991b1b; font-size: 0.875rem;">
                                ${errors.map(error => `<li>${error}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                } else if (validCount === totalCount && totalCount > 0) {
                    summaryDiv.innerHTML = `
                        <div style="background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem;">
                            <div style="color: #16a34a; font-weight: bold;">
                                ✅ All fields valid (${validCount}/${totalCount})
                            </div>
                        </div>
                    `;
                } else {
                    summaryDiv.innerHTML = `
                        <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem;">
                            <div style="color: #64748b; font-weight: bold;">
                                📝 Progress: ${validCount}/${totalCount} fields completed
                            </div>
                        </div>
                    `;
                }
            }
        }

        function validateAllVariables() {
            const templateSelect = document.getElementById('templateSelect');
            const templateId = templateSelect.value;
            
            if (!templateId) {
                showToast('Please select a template', 'error');
                return false;
            }
            
            const template = currentTemplates.find(t => t._id === templateId);
            if (!template) return false;
            
            let isValid = true;
            const errors = [];
            
            template.variables.forEach(variable => {
                const input = document.getElementById(`var_${variable.name}`);
                if (input) {
                    const fieldValid = validateVariable(input);
                    if (!fieldValid) {
                        isValid = false;
                        errors.push(`${variable.name}: ${document.getElementById(`error_${variable.name}`).textContent}`);
                    }
                }
            });
            
            if (!isValid) {
                showToast('Please fix validation errors: ' + errors.join(', '), 'error');
            }
            
            return isValid;
        }

        async function generateLabel(event) {
            event.preventDefault();
            
            // Validate all variables first
            if (!validateAllVariables()) {
                return;
            }
            
            const templateId = document.getElementById('templateSelect').value;
            const template = currentTemplates.find(t => t._id === templateId);
            
            const data = {};
            let hasData = false;
            
            template.variables.forEach(variable => {
                const input = document.getElementById(`var_${variable.name}`);
                if (input) {
                    const value = input.value.trim();
                    if (value) {
                        data[variable.name] = value;
                        hasData = true;
                    }
                }
            });
            
            if (!hasData) {
                showToast('Please fill in at least one field', 'error');
                return;
            }
            
            // Show loading state
            const generateBtn = document.querySelector('#generator-tab button[type="submit"]');
            const originalText = generateBtn.textContent;
            generateBtn.textContent = 'Generating...';
            generateBtn.disabled = true;
            
            try {
                const response = await fetch('/api/label/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ templateId, data })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to generate label');
                }
                
                const label = await response.json();
                
                // Check for unreplaced variables
                if (label.unreplacedVariables && label.unreplacedVariables.length > 0) {
                    showToast(`Warning: Some variables were not replaced: ${label.unreplacedVariables.join(', ')}`, 'warning');
                }
                
                showLabelPreview(label);
                
                // Also save the generated label
                try {
                    const saveResponse = await fetch('/api/generated-labels', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            templateId, 
                            data, 
                            trackingId: data.trackingId || null 
                        })
                    });
                    
                    if (saveResponse.ok) {
                        showToast('Label generated and saved successfully', 'success');
                    } else {
                        showToast('Label generated but could not be saved', 'warning');
                    }
                } catch (saveError) {
                    showToast('Label generated but could not be saved', 'warning');
                }
                
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                // Restore button state
                generateBtn.textContent = originalText;
                generateBtn.disabled = false;
            }
        }

        function showLabelPreview(labelData) {
            const container = document.getElementById('labelPreview');
            container.style.display = 'block';
            
            // Convert mm to pixels at 96 DPI (1mm = 3.78px)
            const mmToPx = 3.78;
            const widthPx = labelData.dimensions.width * mmToPx;
            const heightPx = labelData.dimensions.height * mmToPx;
            
            // Calculate scale to fit in container (max 600px width, 400px height)
            const maxWidth = 600;
            const maxHeight = 400;
            const scale = Math.min(maxWidth / widthPx, maxHeight / heightPx, 1);
            
            const scaledWidth = widthPx * scale;
            const scaledHeight = heightPx * scale;
            
            container.innerHTML = `
                <div style="margin-bottom: 10px; font-size: 12px; color: #666;">
                    Preview (Scale: ${Math.round(scale * 100)}% - ${labelData.dimensions.width}×${labelData.dimensions.height}${labelData.dimensions.unit})
                </div>
                <div class="preview-content" style="
                    width: ${scaledWidth}px;
                    height: ${scaledHeight}px;
                    font-size: ${labelData.style.fontSize * scale}px;
                    font-family: ${labelData.style.fontFamily};
                    text-align: ${labelData.style.alignment};
                    background-color: ${labelData.style.backgroundColor};
                    color: ${labelData.style.textColor};
                    border: ${labelData.style.borderWidth}px solid ${labelData.style.borderColor};
                    display: flex;
                    align-items: flex-start;
                    justify-content: flex-start;
                    padding: 8px;
                    box-sizing: border-box;
                    overflow: auto;
                ">
                    ${labelData.template}
                </div>
            `;
            
            // Scroll to preview
            container.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Generated Labels Management
        let currentGeneratedLabels = [];
        let currentGeneratedPage = 0;
        const generatedLabelsPerPage = 10;

        async function loadGeneratedLabels(page = 0) {
            try {
                const response = await fetch(`/api/generated-labels?limit=${generatedLabelsPerPage}&offset=${page * generatedLabelsPerPage}`);
                if (!response.ok) throw new Error('Failed to load generated labels');
                
                const result = await response.json();
                currentGeneratedLabels = result.labels;
                currentGeneratedPage = page;
                
                renderGeneratedLabels();
                renderGeneratedLabelsPagination(result.total);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function renderGeneratedLabels() {
            const container = document.getElementById('generatedLabelsList');
            
            if (currentGeneratedLabels.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        <h3>No generated labels yet</h3>
                        <p>Generate and save labels to see them here</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = currentGeneratedLabels.map(label => `
                <div class="template-item">
                    <div class="template-header">
                        <div>
                            <div class="template-name">${label.templateName}</div>
                            <div class="template-description">
                                ${label.trackingId ? `Tracking: ${label.trackingId}` : 'Custom label'}
                                ${label.notes ? ` - ${label.notes}` : ''}
                            </div>
                        </div>
                        <div class="template-actions">
                            <button class="btn btn-secondary btn-sm" onclick="viewGeneratedLabel('${label._id}')">View</button>
                            <button class="btn btn-secondary btn-sm" onclick="editGeneratedLabel('${label._id}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteGeneratedLabel('${label._id}')">Delete</button>
                        </div>
                    </div>
                    <div class="template-meta">
                        <span>${label.dimensions.width}×${label.dimensions.height}mm</span>
                        <span>Status: ${label.status}</span>
                        <span>Generated ${new Date(label.generatedAt).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderGeneratedLabelsPagination(total) {
            const container = document.getElementById('generatedLabelsPagination');
            const totalPages = Math.ceil(total / generatedLabelsPerPage);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let paginationHTML = '<div style="display: flex; justify-content: center; gap: 10px; align-items: center;">';
            
            // Previous button
            if (currentGeneratedPage > 0) {
                paginationHTML += `<button class="btn btn-secondary btn-sm" onclick="loadGeneratedLabels(${currentGeneratedPage - 1})">Previous</button>`;
            }
            
            // Page numbers
            for (let i = 0; i < totalPages; i++) {
                if (i === currentGeneratedPage) {
                    paginationHTML += `<span style="padding: 5px 10px; font-weight: bold;">${i + 1}</span>`;
                } else {
                    paginationHTML += `<button class="btn btn-secondary btn-sm" onclick="loadGeneratedLabels(${i})">${i + 1}</button>`;
                }
            }
            
            // Next button
            if (currentGeneratedPage < totalPages - 1) {
                paginationHTML += `<button class="btn btn-secondary btn-sm" onclick="loadGeneratedLabels(${currentGeneratedPage + 1})">Next</button>`;
            }
            
            paginationHTML += '</div>';
            container.innerHTML = paginationHTML;
        }

        async function viewGeneratedLabel(labelId) {
            try {
                const response = await fetch(`/api/generated-labels/${labelId}`);
                if (!response.ok) throw new Error('Failed to load label');
                
                const label = await response.json();
                
                // Create or update printable view modal
                let modal = document.getElementById('printModal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = 'printModal';
                    modal.className = 'print-modal';
                    modal.innerHTML = `
                        <div class="print-modal-content">
                            <div class="print-modal-header">
                                <h3>Printable Labels</h3>
                                <div class="print-modal-actions">
                                    <button class="btn btn-primary" onclick="window.print()">
                                        <span>🖨️</span> Print 2 Labels
                                    </button>
                                    <button class="btn btn-secondary" onclick="closePrintModal()">
                                        <span>✕</span> Close
                                    </button>
                                </div>
                            </div>
                            <div class="print-modal-body">
                                <div class="print-options">
                                    <label style="margin-right: 20px;">
                                        <input type="radio" name="printLayout" value="duplicate" onchange="updatePrintLayout('duplicate')"> 
                                        <span>Print Same Label Twice</span>
                                    </label>
                                    <label>
                                        <input type="radio" name="printLayout" value="different" checked onchange="updatePrintLayout('different')"> 
                                        <span>Print Different Labels</span>
                                    </label>
                                </div>
                                <div id="printableLabels"></div>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(modal);
                }
                
                // Store the label data for later use
                modal.currentLabel = label;
                
                // Ensure print-options exist (in case modal was reused from template preview)
                let printOptions = modal.querySelector('.print-options');
                if (!printOptions) {
                    const printModalBody = modal.querySelector('.print-modal-body');
                    if (printModalBody) {
                        printModalBody.innerHTML = `
                            <div class="print-options">
                                <label style="margin-right: 20px;">
                                    <input type="radio" name="printLayout" value="duplicate" onchange="updatePrintLayout('duplicate')"> 
                                    <span>Print Same Label Twice</span>
                                </label>
                                <label>
                                    <input type="radio" name="printLayout" value="different" checked onchange="updatePrintLayout('different')"> 
                                    <span>Print Different Labels</span>
                                </label>
                            </div>
                            <div id="printableLabels"></div>
                        `;
                    }
                }
                
                // Update header
                const header = modal.querySelector('.print-modal-header h3');
                header.textContent = 'Printable Labels - A4 Layout';
                
                // Generate the double label layout
                generateDoubleLabelLayout(label, 'different');
                
                // Show the modal
                modal.classList.add('active');
                
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function generateDoubleLabelLayout(label, layoutType) {
            // Calculate actual size (1mm = 3.78px at 96 DPI)
            const mmToPx = 3.78;
            const actualWidthPx = label.dimensions.width * mmToPx;
            const actualHeightPx = label.dimensions.height * mmToPx;
            
            // A4 paper dimensions in pixels (210mm × 297mm at 96 DPI)
            const a4WidthPx = 210 * mmToPx; // ~794px
            const a4HeightPx = 297 * mmToPx; // ~1123px
            
            // CSS now handles all layout and spacing
            const printableContent = document.getElementById('printableLabels');
            
            if (!printableContent) {
                console.error('Printable labels container not found');
                return;
            }
            
            if (layoutType === 'duplicate') {
                // Same label twice
                printableContent.innerHTML = `
                    <div class="a4-print-layout">
                        <div class="printable-label-container" style="
                            font-size: ${label.style.fontSize}px;
                            font-family: ${label.style.fontFamily};
                            text-align: ${label.style.alignment};
                            background-color: ${label.style.backgroundColor};
                            color: ${label.style.textColor};
                            border: ${label.style.borderWidth}px solid ${label.style.borderColor};
                            overflow: hidden;
                        ">
                            ${label.generatedHtml}
                        </div>
                        <div class="printable-label-container" style="
                            font-size: ${label.style.fontSize}px;
                            font-family: ${label.style.fontFamily};
                            text-align: ${label.style.alignment};
                            background-color: ${label.style.backgroundColor};
                            color: ${label.style.textColor};
                            border: ${label.style.borderWidth}px solid ${label.style.borderColor};
                            overflow: hidden;
                        ">
                            ${label.generatedHtml}
                        </div>
                    </div>
                `;
            } else {
                // Different labels - show only first label, no empty space
                printableContent.innerHTML = `
                    <div class="a4-print-layout">
                        <div class="printable-label-container" style="
                            font-size: ${label.style.fontSize}px;
                            font-family: ${label.style.fontFamily};
                            text-align: ${label.style.alignment};
                            background-color: ${label.style.backgroundColor};
                            color: ${label.style.textColor};
                            border: ${label.style.borderWidth}px solid ${label.style.borderColor};
                            overflow: hidden;
                        ">
                            ${label.generatedHtml}
                        </div>
                    </div>
                `;
            }
            
            // Remove any existing print info
            const existingInfo = document.querySelector('.print-info');
            if (existingInfo) existingInfo.remove();
        }

        function updatePrintLayout(layoutType) {
            const modal = document.getElementById('printModal');
            if (modal && modal.currentLabel) {
                generateDoubleLabelLayout(modal.currentLabel, layoutType);
            }
        }

        function closePrintModal() {
            const modal = document.getElementById('printModal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        function resetForm() {
            document.getElementById('generateForm').reset();
            document.getElementById('variableFields').innerHTML = '';
            document.getElementById('variableFieldsSection').style.display = 'none';
            
            // Remove validation summary
            const summaryDiv = document.getElementById('validationSummary');
            if (summaryDiv) summaryDiv.remove();
            
            // Clear any preview
            document.getElementById('labelPreview').style.display = 'none';
            
            showToast('Form reset successfully', 'info');
        }

        async function editGeneratedLabel(labelId) {
            try {
                const response = await fetch(`/api/generated-labels/${labelId}`);
                if (!response.ok) throw new Error('Failed to load label');
                
                const label = await response.json();
                
                // Switch to generator tab
                document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                document.querySelectorAll('.tab')[1].classList.add('active'); // Generator tab
                document.getElementById('generator-tab').classList.add('active');
                
                // Wait for tab switch, then populate template and trigger change
                setTimeout(() => {
                    // First populate the template select
                    const select = document.getElementById('templateSelect');
                    select.innerHTML = '<option value="">Choose a template...</option>';
                    
                    currentTemplates.forEach(template => {
                        if (template.isActive) {
                            select.innerHTML += `<option value="${template._id}">${template.name}</option>`;
                        }
                    });
                    
                    // Set the template value and trigger change event
                    select.value = label.templateId;
                    
                    // Manually trigger the change event to load the form fields
                    const changeEvent = new Event('change', { bubbles: true });
                    select.dispatchEvent(changeEvent);
                    
                    // Wait for form fields to be created, then populate them with existing data
                    setTimeout(() => {
                        Object.keys(label.labelData).forEach(key => {
                            const input = document.getElementById(`var_${key}`);
                            if (input) {
                                input.value = label.labelData[key];
                                // Trigger validation for the populated field
                                validateVariable(input);
                            }
                        });
                        
                        // Update validation summary after populating all fields
                        setTimeout(updateValidationSummary, 100);
                    }, 200);
                }, 100);
                
                showToast('Label loaded for editing. Modify data and click Generate Label to regenerate.', 'info');
                
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function deleteGeneratedLabel(labelId) {
            if (!confirm('Are you sure you want to delete this generated label?')) return;
            
            try {
                const response = await fetch(`/api/generated-labels/${labelId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('Failed to delete label');
                
                showToast('Label deleted successfully', 'success');
                loadGeneratedLabels(currentGeneratedPage);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            loadTemplates();
        });

        // Logout function
        async function handleLogout() {
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST'
                });
                
                if (response.ok) {
                    window.location.href = '/login';
                } else {
                    showToast('Logout failed', 'error');
                }
            } catch (error) {
                showToast('Logout failed', 'error');
            }
        }

        // Close modal when clicking outside
        document.getElementById('templateModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
